# go-botje: keeper + core + postgres. Split mode is the only mode:
# plain `docker compose up -d` runs all three.
#
# The keeper owns the IRC connection; the core (dispatcher + modules)
# restarts freely without dropping the session. To make that survive
# image rebuilds, the keeper runs a PINNED image tag from .env
# (BOTJE_KEEPER_IMAGE) with no build section: `docker compose build`
# and `up -d` never touch it. Upgrade flow:
#
#   core upgrade (the common case, reconnect-free):
#     docker compose build core && docker compose up -d
#   keeper upgrade (rare, visible reconnect):
#     make keeper-image           # builds + tags go-botje:keeper-<date>
#     edit BOTJE_KEEPER_IMAGE in .env, then docker compose up -d
#
# ALL site config lives in .env (copy .env.example): IRC server, nick,
# channels, postgres data path, secrets. This file stays static.

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: botje
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: botje
    volumes:
      # named volume by default; set BOTJE_PG_DATA=/host/path in .env
      # for a bind mount
      - ${BOTJE_PG_DATA:-pgdata}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botje -d botje"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  keeper:
    image: ${BOTJE_KEEPER_IMAGE:?run 'make keeper-image' and set BOTJE_KEEPER_IMAGE in .env}
    command: [keeper]
    environment:
      TZ: ${TZ:-Europe/Amsterdam}
      BOTJE_IRC_ADDR: ${BOTJE_IRC_ADDR:?set BOTJE_IRC_ADDR in .env}
      BOTJE_IRC_TLS: ${BOTJE_IRC_TLS:-true}
      BOTJE_SOCKET: /run/keeper/keeper.sock
      # optional TLS client cert: the ircd identifies the bot by its
      # fingerprint (oper certfp autologin). Generate under
      # mounts/certs, see .env.example.
      BOTJE_TLS_CERT: ${BOTJE_TLS_CERT:-}
      BOTJE_TLS_KEY: ${BOTJE_TLS_KEY:-}
    volumes:
      - keepersock:/run/keeper
      - ./mounts/certs:/certs:ro
    extra_hosts:
      # optional FQDN pin, e.g. "irc.example.com:10.0.0.2"; the default
      # is a no-op mapping
      - "${BOTJE_EXTRA_HOST:-localhost:127.0.0.1}"
    restart: unless-stopped

  core:
    build: .
    image: go-botje:latest
    depends_on:
      postgres:
        condition: service_healthy
      keeper:
        condition: service_started
    # -admin binds 0.0.0.0 inside the container; the host publish below
    # is what restricts it to loopback.
    command: [core, -admin=0.0.0.0:1924]
    environment:
      TZ: ${TZ:-Europe/Amsterdam}
      BOTJE_NETWORK: ${BOTJE_NETWORK:-junerules}
      BOTJE_NICK: ${BOTJE_NICK:-Meretrix}
      BOTJE_CHANNELS: ${BOTJE_CHANNELS:-#testing}
      BOTJE_SOCKET: /run/keeper/keeper.sock
      BOTJE_PG_DSN: postgres://botje:${POSTGRES_PASSWORD}@postgres:5432/botje?sslmode=disable
      # name:bcrypt-hash (from `botje hash <pass>`); optional
      BOTJE_SUPERUSER: ${BOTJE_SUPERUSER:-}
      # per-channel IRC logs + ops.log (audit trail); the host dir must
      # be writable by uid 1000: mkdir -p mounts/logs && sudo chown 1000 mounts/logs
      BOTJE_LOG_DIR: /logs
    volumes:
      - keepersock:/run/keeper
      - ./mounts/logs:/logs
    ports:
      - "127.0.0.1:1924:1924"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 1924 || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
    restart: unless-stopped

volumes:
  pgdata:
  keepersock:
